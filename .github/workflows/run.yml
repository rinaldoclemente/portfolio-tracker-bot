name: Run Portfolio Bot

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 Italia
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4   # ✅ aggiornato

    - name: Setup Python
      uses: actions/setup-python@v5   # ✅ aggiornato
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run bot
      run: python portfolio_bot.py
